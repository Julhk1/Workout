<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Belt</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>Fitness Belt</h1>
      <p id="subtitle">Discipline > Motivation</p>
    </div>

    <div class="lang">
      <button onclick="setLang('fr')">FR</button>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('ar')">AR</button>
    </div>
  </div>

  <!-- BELT CARD -->
  <div class="belt-card">

    <div class="belt-title" id="belt">
      🟡 YELLOW BELT
    </div>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <div class="stats" id="stats">
      0 workouts • 0 min • 0 streak
    </div>

  </div>

  <!-- WORKOUT SELECT -->
  <div class="section-title">Quick Workout</div>

  <div class="grid">
    <button onclick="workout(5)">5 min</button>
    <button onclick="workout(10)">10 min</button>
    <button onclick="workout(15)">15 min</button>
  </div>

  <!-- ACTION -->
  <button class="primary" onclick="finishWorkout()">
    ✔ Complete Session
  </button>

  <!-- SHARE -->
  <div class="share">
    <button onclick="generateCard()">Generate Card</button>
    <button onclick="downloadCard()">Share</button>
  </div>

  <canvas id="card" width="1080" height="1080"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
