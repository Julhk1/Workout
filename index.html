<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Flow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🔥 Fitness Flow</h1>
  <p class="subtitle">Choisis ton profil</p>

  <div class="cards">

    <div class="card" onclick="selectProfile('male')">
      <h2>👨 Homme</h2>
      <p>Force & Performance</p>
    </div>

    <div class="card" onclick="selectProfile('female')">
      <h2>👩 Femme</h2>
      <p>Forme & Énergie</p>
    </div>

    <div class="card" onclick="selectProfile('senior')">
      <h2>👵 Senior</h2>
      <p>Santé & Mobilité</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
