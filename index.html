<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ FitTimer - Entraînement Rapide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>⚡ FIT<span>TIMER</span></h1>
        <p>Sélectionnez votre profil et commencez votre transformation</p>
    </header>

    <main class="welcome-container">
        <div class="card" onclick="selectProfile('homme')">
            <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?q=80&w=600&auto=format&fit=crop');"></div>
            <div class="card-content">
                <h2>HOMME</h2>
                <p>Puissance & Définition Musculaire</p>
            </div>
        </div>

        <div class="card" onclick="selectProfile('femme')">
            <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1517838277536-f5f99be501cd?q=80&w=600&auto=format&fit=crop');"></div>
            <div class="card-content">
                <h2>FEMME</h2>
                <p>Silhouette Tonique & Galbée</p>
            </div>
        </div>

        <div class="card" onclick="selectProfile('senior')">
            <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=600&auto=format&fit=crop');"></div>
            <div class="card-content">
                <h2>SENIOR</h2>
                <p>Vitalité, Mobilité & Santé</p>
            </div>
        </div>
    </main>

    <section id="duration-selection" class="hidden">
        <h2>Choisissez la durée de votre séance</h2>
        <div class="duration-buttons">
            <button onclick="selectDuration(5)">5 Minutes</button>
            <button onclick="selectDuration(10)">10 Minutes</button>
            <button onclick="selectDuration(15)">15 Minutes</button>
        </div>
    </section>

    <section id="workout-session" class="hidden">
        <h2 id="current-exercise-name">Exercice</h2>
        <div class="timers-container">
            <div class="timer-box">
                <span class="timer-label">Exercice</span>
                <div id="exercise-timer" class="timer-display">00:30</div>
            </div>
            <div class="timer-box-total">
                <span class="timer-label">Temps Total Restant</span>
                <div id="total-timer" class="timer-display-total">05:00</div>
            </div>
        </div>
        <button id="start-btn" onclick="startWorkout()">DÉBUTER</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
